model:
  name: gpt2

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target:
    - c_attn
    - c_proj

training:
  learning_rate: 0.0002
  batch_size: 8
  gradient_accumulation_steps: 2
  num_epochs: 10
  warmup_steps: 20
  weight_decay: 0.01
  gradient_clip: 1.0
  mixed_precision: bf16
  schedule: cosine
  max_length: 512

validation:
  split: 0.1
  eval_every_epochs: 0.5
